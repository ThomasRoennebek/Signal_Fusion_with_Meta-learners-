# =============================================================================
# Stage 2 Experiment Configuration
# =============================================================================
#
# PURPOSE:
# This YAML file is the SINGLE SOURCE OF TRUTH for all Stage 2 experiments.
# It defines the experimental setup for department-level few-shot adaptation
# using gold labels and optional synthetic support augmentation.
#
# IMPORTANT THESIS CONSTRAINTS:
# - Stage 1 pretrained initializers are loaded from saved artifacts.
# - Random init must use the same MLP capacity as Stage 1 for fair comparison.
# - Synthetic augmentation, when used, is applied only to the support set.
# - Query/evaluation sets must remain fully real.
# - Balanced k-shot settings must respect the available contract-level labels.
#
# PRESET STATUS KEY:
#   CANONICAL  — use this preset for thesis experiments; located in presets: section
#   ARCHIVED   — duplicate or superseded; located in archived_presets: section only;
#                preserved for reference and reproducibility
#
# DOCUMENTATION-ONLY FIELDS:
# The following fields are read by humans but NOT by the runner:
#   - augmentation_scope    : always "meta_test_support_only" by implementation;
#                             kept in presets for clarity, silently ignored by
#                             resolve_experiment_grid() / run_stage2_pipeline()
#   - freeze_strategy       : PLANNED, not yet implemented; see maml_freeze_ablation
#
# CANONICAL EXPERIMENT GROUPS (10 presets in 4 groups):
#
#   [GROUP 1 — DEBUG / SMOKE TESTS]
#   - quick_debug           : 2-episode ANIL+finetune on Logistics (k=2, A_weak_only)
#   - stage2b_debug         : Minimal Stage 2b smoke test (k=1, ANIL+finetune, none vs smote_nc)
#     Research questions: Confirm pipeline is healthy before running longer experiments
#
#   [GROUP 2 — MAIN THESIS EXPERIMENTS]
#   - thesis_main           : 5 methods × k=1/k=2 × 2 depts × 2 inits (RQs 1–8)
#   - init_ablation         : 5 methods × 5 inits × 2 depts (RQ: Stage 1 → Stage 2 transfer)
#   - k_shot_label_budget   : k=1/k=2 curve, all 5 methods, 2 depts, 2 inits
#     Research questions: RQs 1–8 (method comparison, initialization quality, k-shot effects)
#
#   [GROUP 3 — MAML-FOCUSED OPTIMIZATION]
#   - maml_lr_sweep         : ANIL/FOMAML/MAML with inner-LR × inner-step grid
#   - maml_freeze_ablation  : [TODO — NOT YET RUNNABLE] Layer-freeze ablation
#   - maml_mechanics_debug  : [TODO — NOT YET RUNNABLE] MAML inner-loop mechanics
#     Research questions: RQ 9 (MAML hyperparameter sensitivity and convergence behavior)
#
#   [GROUP 4 — STAGE 2B SUPPORT AUGMENTATION]
#   - stage2b_smotenc       : ANIL with none vs SMOTENC, target_effective_k ablation
#   - stage2b_label_budget  : 4 adaptive methods with augmentation under label budget
#     Research questions: RQ 11–12 (Does SMOTENC help under real label constraints?)
#
# =============================================================================

# ---------------------------------------------------------
# Base Configuration
# ---------------------------------------------------------
base_config:
  seed: 42
  verbose: true
  method: "finetune"

  data:
    data_filename: "contract_with_features_labeled_with_gold.csv"
    target_col: "gold_y"
    group_col: "contract_id"
    department_col: "department"
    observation_year_col: "observation_year"

  features:
    source: "stage1_preprocessor"

  stage1_init:
    init_name: "A_weak_only"
    model_filename: "mlp_pretrained.pt"
    preprocessor_filename: "mlp_pretrained_preprocessor.joblib"

    # For random init, no pretrained weights are loaded.
    # The A_weak_only preprocessor defines the feature space so random init
    # uses the same input representation as the primary pretrained baseline.
    random_preprocessor_source: "A_weak_only"

  task_config:
    target_department: "Logistics"

    # False because some query sets become one-class under extreme scarcity.
    # Metrics such as AUROC should return NaN when query has one class.
    require_both_query_classes: false

    min_query_contracts: 1
    exclude_departments: []

  support_config:
    n_support_pos: 2
    n_support_neg: 2

  meta_config:
    meta_batch_size: 4
    meta_iterations: 200
    inner_lr: 0.01
    outer_lr: 0.001
    inner_steps: 3
    target_inner_steps: 5
    n_repeats: 20

  # ---------------------------------------------------------------------------
  # MLP architecture for random-init baseline only.
  #
  # Pretrained Stage 1 initializers read architecture from metadata.json.
  # Random init must match Stage 1 capacity for a fair comparison.
  #
  # Current Stage 1 architecture:
  #   hidden_dim_1: 256
  #   hidden_dim_2: 128
  #   dropout: 0.1
  # ---------------------------------------------------------------------------
  mlp_config:
    hidden_dim_1: 256
    hidden_dim_2: 128
    dropout: 0.1

  evaluation:
    ranking_k: 10
    calibration_method: null

  output:
    save_predictions: true
    save_history: true
    skip_if_exists: true
    force_rerun: false


# ---------------------------------------------------------
# Global Experiment Grid
# ---------------------------------------------------------
experiment_grid:
  methods:
    - "zero_shot"
    - "finetune"
    - "anil"
    - "fomaml"
    - "maml"

  # Feasible balanced contract-level support sizes.
  # Avoid k=5/k=10 because current gold labels do not support those settings.
  support_grid:
    - n_support_pos: 1
      n_support_neg: 1
    - n_support_pos: 2
      n_support_neg: 2

  inner_steps_grid:
    - 1
    - 3
    - 5

  init_names:
    - "A_weak_only"
    - "B_gold_only"
    - "C_hybrid"
    - "D_hybrid_unweighted"
    - "random"


# ---------------------------------------------------------
# Presets  [CANONICAL — use these for thesis experiments]
# ---------------------------------------------------------
