data:
  raw_path: "Data/raw/dataset.csv"
  processed_output_path: "Data/processed/stage1_output.csv"

xgboost:
  n_estimators: 300
  learning_rate: 0.05
  max_depth: 5
  min_child_weight: 3
  subsample: 0.8
  colsample_bytree: 0.8

elasticnet:
  alpha: 0.01
  l1_ratio: 0.5
  max_iter: 10000

snorkel:
  lfs_to_use: "all" # Alternately, specify LF subsets like 'logistics_specific'
