# -----------------------------------------------------------------------------
# Stage 1 Experiment Configuration
# This file perfectly mirrors the 'experiment_config' dictionary defined
# in Cell 5 of the Jupyter notebook (16_stage1_baselines.ipynb).
# -----------------------------------------------------------------------------

seed: 42
test_size: 0.30
verbose: true

# Data
data_filename: "contract_with_features_labeled_with_gold.csv"
weak_target_col: "renegotiation_prob"
gold_col: "gold_y"
group_col: "contract_id"
department_col: "department"

# Target department whose gold labels are excluded from Stage 1 B/C/D
# and reserved for Stage 2 adaptation.  Condition A (weak-only) is global
# and unaffected by this setting.
target_department: "Logistics"

# Hybrid weights
hybrid_weak_weight: 1.0
hybrid_gold_weight: 5.0

# -----------------------------------------------------------------------------
# Baselines
# -----------------------------------------------------------------------------
baseline_config:
  scale_numeric_for_elastic_net: true
  scale_numeric_for_xgboost: false
  add_numeric_missing_indicator: true
  
  elastic_net:
    alpha: 0.005
    l1_ratio: 0.5
    max_iter: 10000
    random_state: 42
    
  xgboost:
    n_estimators: 500
    learning_rate: 0.05
    max_depth: 6
    min_child_weight: 3
    subsample: 0.8
    colsample_bytree: 0.8
    reg_alpha: 0.0
    reg_lambda: 1.0
    random_state: 42
    n_jobs: -1

# -----------------------------------------------------------------------------
# MLP (Deep Learning)
# -----------------------------------------------------------------------------
mlp_config:
  n_epochs: 100
  patience: 10
  lr: 0.001
  weight_decay: 0.00001
  train_batch_size: 128
  val_batch_size: 256
  hidden_dim_1: 256
  hidden_dim_2: 128  # Corrected: actual saved artifacts use 128, not 64
  dropout: 0.3
