<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1200" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <linearGradient id="inputGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#B6DCFA"/>
    </linearGradient>
    <linearGradient id="linearGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D5E8D4"/>
      <stop offset="100%" stop-color="#9DC3A4"/>
    </linearGradient>
    <linearGradient id="bnGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFF2CC"/>
      <stop offset="100%" stop-color="#F6D966"/>
    </linearGradient>
    <linearGradient id="reluGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FCE4D6"/>
      <stop offset="100%" stop-color="#F4B183"/>
    </linearGradient>
    <linearGradient id="dropGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E1D5E7"/>
      <stop offset="100%" stop-color="#B48FC7"/>
    </linearGradient>
    <linearGradient id="outputGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F8CECC"/>
      <stop offset="100%" stop-color="#E06666"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-size="24" font-weight="bold" fill="#222">
    Stage 1 MLP — TabularMLP Architecture
  </text>
  <text x="450" y="65" text-anchor="middle" font-size="14" fill="#666">
    src/master_thesis/mlp.py  ·  hidden_dim_1=256, hidden_dim_2=64, dropout=0.3
  </text>

  <!-- ================= INPUT ================= -->
  <rect x="280" y="95" width="340" height="70" rx="10" fill="url(#inputGrad)" stroke="#3A77B8" stroke-width="2"/>
  <text x="450" y="125" text-anchor="middle" font-size="18" font-weight="bold" fill="#1F3F66">
    Input Features
  </text>
  <text x="450" y="148" text-anchor="middle" font-size="13" fill="#1F3F66">
    ~50 numeric + one-hot encoded columns after preprocessor
  </text>

  <!-- side annotation -->
  <text x="660" y="130" font-size="12" fill="#555" font-style="italic">
    Contract features:
  </text>
  <text x="660" y="148" font-size="12" fill="#555" font-style="italic">
    age, ESG, financial, news, market, …
  </text>

  <line x1="450" y1="165" x2="450" y2="190" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ================= BLOCK 1 ================= -->
  <rect x="180" y="195" width="540" height="280" rx="14" fill="none" stroke="#9AA6B2" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="200" y="218" font-size="13" font-weight="bold" fill="#555">Hidden Block 1</text>

  <!-- Linear 1 -->
  <rect x="280" y="230" width="340" height="55" rx="8" fill="url(#linearGrad)" stroke="#548235" stroke-width="2"/>
  <text x="450" y="254" text-anchor="middle" font-size="16" font-weight="bold" fill="#254117">
    Linear(input_dim → 256)
  </text>
  <text x="450" y="273" text-anchor="middle" font-size="12" fill="#254117">
    learned weights W₁ · x + b₁
  </text>
  <line x1="450" y1="285" x2="450" y2="305" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- BatchNorm 1 -->
  <rect x="280" y="310" width="340" height="45" rx="8" fill="url(#bnGrad)" stroke="#BF9000" stroke-width="2"/>
  <text x="450" y="333" text-anchor="middle" font-size="15" font-weight="bold" fill="#5A4500">
    BatchNorm1d(256)
  </text>
  <text x="450" y="349" text-anchor="middle" font-size="11" fill="#5A4500">
    normalize activations → stable training
  </text>
  <line x1="450" y1="355" x2="450" y2="375" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ReLU 1 -->
  <rect x="280" y="380" width="340" height="40" rx="8" fill="url(#reluGrad)" stroke="#C55A11" stroke-width="2"/>
  <text x="450" y="400" text-anchor="middle" font-size="15" font-weight="bold" fill="#5B2A06">
    ReLU()   —   max(0, x)
  </text>
  <text x="450" y="414" text-anchor="middle" font-size="11" fill="#5B2A06">
    non-linearity: keep positives, zero negatives
  </text>
  <line x1="450" y1="420" x2="450" y2="440" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Dropout 1 -->
  <rect x="280" y="445" width="340" height="25" rx="8" fill="url(#dropGrad)" stroke="#7030A0" stroke-width="2"/>
  <text x="450" y="462" text-anchor="middle" font-size="13" font-weight="bold" fill="#3B1252">
    Dropout(p=0.3)   —   randomly zero 30 % of neurons (train only)
  </text>

  <line x1="450" y1="480" x2="450" y2="505" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ================= BLOCK 2 ================= -->
  <rect x="180" y="510" width="540" height="280" rx="14" fill="none" stroke="#9AA6B2" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="200" y="533" font-size="13" font-weight="bold" fill="#555">Hidden Block 2</text>

  <!-- Linear 2 -->
  <rect x="280" y="545" width="340" height="55" rx="8" fill="url(#linearGrad)" stroke="#548235" stroke-width="2"/>
  <text x="450" y="569" text-anchor="middle" font-size="16" font-weight="bold" fill="#254117">
    Linear(256 → 64)
  </text>
  <text x="450" y="588" text-anchor="middle" font-size="12" fill="#254117">
    compressed risk representation  (the 64-dim embedding)
  </text>
  <line x1="450" y1="600" x2="450" y2="620" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- BatchNorm 2 -->
  <rect x="280" y="625" width="340" height="45" rx="8" fill="url(#bnGrad)" stroke="#BF9000" stroke-width="2"/>
  <text x="450" y="648" text-anchor="middle" font-size="15" font-weight="bold" fill="#5A4500">
    BatchNorm1d(64)
  </text>
  <text x="450" y="664" text-anchor="middle" font-size="11" fill="#5A4500">
    same purpose as BN1; patched with running_var ≥ 1e-3 for Stage 2
  </text>
  <line x1="450" y1="670" x2="450" y2="690" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ReLU 2 -->
  <rect x="280" y="695" width="340" height="40" rx="8" fill="url(#reluGrad)" stroke="#C55A11" stroke-width="2"/>
  <text x="450" y="715" text-anchor="middle" font-size="15" font-weight="bold" fill="#5B2A06">
    ReLU()
  </text>
  <text x="450" y="729" text-anchor="middle" font-size="11" fill="#5B2A06">
    second non-linearity
  </text>
  <line x1="450" y1="735" x2="450" y2="755" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Dropout 2 -->
  <rect x="280" y="760" width="340" height="25" rx="8" fill="url(#dropGrad)" stroke="#7030A0" stroke-width="2"/>
  <text x="450" y="777" text-anchor="middle" font-size="13" font-weight="bold" fill="#3B1252">
    Dropout(p=0.3)
  </text>

  <line x1="450" y1="795" x2="450" y2="820" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ================= OUTPUT HEAD ================= -->
  <rect x="280" y="825" width="340" height="55" rx="8" fill="url(#outputGrad)" stroke="#B02C2C" stroke-width="2"/>
  <text x="450" y="849" text-anchor="middle" font-size="16" font-weight="bold" fill="#5A0F0F">
    Linear(64 → 1)    ← classification head
  </text>
  <text x="450" y="868" text-anchor="middle" font-size="12" fill="#5A0F0F">
    outputs a single logit z
  </text>
  <line x1="450" y1="880" x2="450" y2="905" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Sigmoid -->
  <rect x="280" y="910" width="340" height="45" rx="8" fill="#FFE0B2" stroke="#E67E22" stroke-width="2"/>
  <text x="450" y="933" text-anchor="middle" font-size="15" font-weight="bold" fill="#6B3A00">
    Sigmoid(z) = 1 / (1 + e^(-z))
  </text>
  <text x="450" y="949" text-anchor="middle" font-size="11" fill="#6B3A00">
    applied for evaluation / inference  (via BCEWithLogitsLoss during training)
  </text>
  <line x1="450" y1="955" x2="450" y2="980" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Output -->
  <rect x="280" y="985" width="340" height="60" rx="10" fill="#FFF7E6" stroke="#D47A00" stroke-width="2"/>
  <text x="450" y="1011" text-anchor="middle" font-size="18" font-weight="bold" fill="#4A2A00">
    ŷ  ∈  [0, 1]
  </text>
  <text x="450" y="1032" text-anchor="middle" font-size="13" fill="#4A2A00">
    P(contract is risky | features)
  </text>

  <!-- ================= Legend on right ================= -->
  <rect x="740" y="230" width="140" height="560" rx="10" fill="#FAFAFA" stroke="#CCC" stroke-width="1"/>
  <text x="810" y="255" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">Legend</text>

  <rect x="755" y="275" width="25" height="18" fill="url(#linearGrad)" stroke="#548235"/>
  <text x="786" y="289" font-size="11" fill="#333">Linear (learned)</text>

  <rect x="755" y="305" width="25" height="18" fill="url(#bnGrad)" stroke="#BF9000"/>
  <text x="786" y="319" font-size="11" fill="#333">BatchNorm</text>

  <rect x="755" y="335" width="25" height="18" fill="url(#reluGrad)" stroke="#C55A11"/>
  <text x="786" y="349" font-size="11" fill="#333">ReLU</text>

  <rect x="755" y="365" width="25" height="18" fill="url(#dropGrad)" stroke="#7030A0"/>
  <text x="786" y="379" font-size="11" fill="#333">Dropout</text>

  <rect x="755" y="395" width="25" height="18" fill="url(#outputGrad)" stroke="#B02C2C"/>
  <text x="786" y="409" font-size="11" fill="#333">Head (output)</text>

  <rect x="755" y="425" width="25" height="18" fill="url(#inputGrad)" stroke="#3A77B8"/>
  <text x="786" y="439" font-size="11" fill="#333">Input</text>

  <!-- Training info -->
  <line x1="755" y1="465" x2="865" y2="465" stroke="#CCC"/>
  <text x="810" y="485" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Training</text>
  <text x="755" y="505" font-size="10" fill="#555">Loss: BCEWithLogits</text>
  <text x="755" y="522" font-size="10" fill="#555">Optimizer: Adam</text>
  <text x="755" y="539" font-size="10" fill="#555">lr = 0.001</text>
  <text x="755" y="556" font-size="10" fill="#555">weight_decay = 1e-5</text>
  <text x="755" y="573" font-size="10" fill="#555">batch_size = 128</text>
  <text x="755" y="590" font-size="10" fill="#555">epochs ≤ 100</text>
  <text x="755" y="607" font-size="10" fill="#555">patience = 10</text>

  <line x1="755" y1="625" x2="865" y2="625" stroke="#CCC"/>
  <text x="810" y="645" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Stage 2 uses…</text>
  <text x="755" y="665" font-size="10" fill="#555">ANIL: adapts</text>
  <text x="755" y="680" font-size="10" fill="#555">  only Linear(64→1)</text>
  <text x="755" y="700" font-size="10" fill="#555">MAML / FOMAML:</text>
  <text x="755" y="715" font-size="10" fill="#555">  adapt all layers</text>
  <text x="755" y="735" font-size="10" fill="#555">Zero-shot: no update</text>
  <text x="755" y="755" font-size="10" fill="#555">Finetune: gradient</text>
  <text x="755" y="770" font-size="10" fill="#555">  steps on support set</text>

  <!-- Left side annotations -->
  <text x="30" y="400" font-size="11" fill="#777" font-style="italic">Block 1:</text>
  <text x="30" y="417" font-size="11" fill="#777" font-style="italic">  feature → 256d</text>
  <text x="30" y="434" font-size="11" fill="#777" font-style="italic">  high-capacity</text>
  <text x="30" y="451" font-size="11" fill="#777" font-style="italic">  transform</text>

  <text x="30" y="670" font-size="11" fill="#777" font-style="italic">Block 2:</text>
  <text x="30" y="687" font-size="11" fill="#777" font-style="italic">  256 → 64</text>
  <text x="30" y="704" font-size="11" fill="#777" font-style="italic">  compress to</text>
  <text x="30" y="721" font-size="11" fill="#777" font-style="italic">  64-dim embedding</text>

  <text x="30" y="880" font-size="11" fill="#777" font-style="italic">Head:</text>
  <text x="30" y="897" font-size="11" fill="#777" font-style="italic">  64 → 1 logit</text>
  <text x="30" y="914" font-size="11" fill="#777" font-style="italic">  (ANIL adapts</text>
  <text x="30" y="931" font-size="11" fill="#777" font-style="italic">   only this layer)</text>

  <!-- Footer -->
  <text x="450" y="1085" text-anchor="middle" font-size="12" fill="#999" font-style="italic">
    Total parameters ≈ 50·256 + 256·64 + 64·1 + BN/bias terms  ≈  30,000 – 40,000
  </text>
  <text x="450" y="1105" text-anchor="middle" font-size="12" fill="#999" font-style="italic">
    Stage 1 saves weights → models/stage_1/&lt;condition&gt;/mlp_pretrained.pt  →  loaded by Stage 2
  </text>
  <text x="450" y="1135" text-anchor="middle" font-size="11" fill="#BBB">
    Master Thesis · Signal Fusion with Meta-Learners · Stage 1 architecture
  </text>
</svg>
